# Tras merge a main: POST deploy hooks. Sin filtro `branches:` en el evento (evita 0 corridas).
# workflow_dispatch: recuperación manual en Actions.
name: Vercel deploy hooks (PR merged to main)

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hooks:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: POST deploy hooks (API → Web → Admin)
        env:
          VERCEL_DEPLOY_HOOK_API: ${{ secrets.VERCEL_DEPLOY_HOOK_API }}
          VERCEL_DEPLOY_HOOK_WEB: ${{ secrets.VERCEL_DEPLOY_HOOK_WEB }}
          VERCEL_DEPLOY_HOOK_ADMIN: ${{ secrets.VERCEL_DEPLOY_HOOK_ADMIN }}
        run: |
          set -euo pipefail
          post_hook() {
            local label="$1" url="$2"
            if [ -z "${url:-}" ]; then
              echo "::notice::Hook ${label} sin secreto — omitido"
              return 0
            fi
            code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$url" || echo "000")
            echo "POST hook ${label} → HTTP ${code}"
            case "$code" in 200|201|204) ;; *) echo "::warning::Hook ${label} no OK (${code})" ;; esac
          }
          echo "Deploy hooks (event ${{ github.event_name }})"
          post_hook "API" "${VERCEL_DEPLOY_HOOK_API:-}"
          post_hook "WEB" "${VERCEL_DEPLOY_HOOK_WEB:-}"
          post_hook "ADMIN" "${VERCEL_DEPLOY_HOOK_ADMIN:-}"
