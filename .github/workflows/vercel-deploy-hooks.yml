# Dispara redeploy en Vercel vía Deploy Hooks (opcional).
# Configuración: Vercel → Settings → Git → Deploy Hooks (Production).
# Secretos en GitHub: VERCEL_DEPLOY_HOOK_API, VERCEL_DEPLOY_HOOK_WEB, VERCEL_DEPLOY_HOOK_ADMIN
# Si un secreto no existe, el paso se omite. Útil cuando la integración Git→Vercel no actualiza prod.
#
# Tras CI verde en main (misma idea que vercel-prod-cli): no redeploy antes de que pase Verify.
name: Vercel deploy hooks

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-deploy-hooks-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    steps:
      # Sin -f: curl no corta el job en 4xx/5xx; el hook puede estar vencido o mal copiado.
      - name: Redeploy API (hook)
        if: ${{ secrets.VERCEL_DEPLOY_HOOK_API != '' }}
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_API }}" || echo "000")
          echo "HTTP $code"
          case "$code" in 200|201|204) ;; *) echo "::warning::Hook API no OK ($code). Revisá VERCEL_DEPLOY_HOOK_API en GitHub o regeneralo en Vercel." ;; esac

      - name: Redeploy Web (hook)
        if: ${{ secrets.VERCEL_DEPLOY_HOOK_WEB != '' }}
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_WEB }}" || echo "000")
          echo "HTTP $code"
          case "$code" in 200|201|204) ;; *) echo "::warning::Hook Web no OK ($code). Revisá VERCEL_DEPLOY_HOOK_WEB." ;; esac

      - name: Redeploy Admin (hook)
        if: ${{ secrets.VERCEL_DEPLOY_HOOK_ADMIN != '' }}
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_ADMIN }}" || echo "000")
          echo "HTTP $code"
          case "$code" in 200|201|204) ;; *) echo "::warning::Hook Admin no OK ($code). Revisá VERCEL_DEPLOY_HOOK_ADMIN." ;; esac
