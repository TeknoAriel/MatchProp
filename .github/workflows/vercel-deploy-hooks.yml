# Dispara redeploy en Vercel vía Deploy Hooks (opcional).
# Configuración: Vercel → Settings → Git → Deploy Hooks (Production).
# Secretos en GitHub: VERCEL_DEPLOY_HOOK_API, VERCEL_DEPLOY_HOOK_WEB, VERCEL_DEPLOY_HOOK_ADMIN
# Si un secreto no existe, el paso se omite. Útil cuando la integración Git→Vercel no actualiza prod.
name: Vercel deploy hooks

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: vercel-deploy-hooks-${{ github.ref }}
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Redeploy API (hook)
        if: ${{ secrets.VERCEL_DEPLOY_HOOK_API }}
        run: curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_API }}"

      - name: Redeploy Web (hook)
        if: ${{ secrets.VERCEL_DEPLOY_HOOK_WEB }}
        run: curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_WEB }}"

      - name: Redeploy Admin (hook)
        if: ${{ secrets.VERCEL_DEPLOY_HOOK_ADMIN }}
        run: curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_ADMIN }}"
