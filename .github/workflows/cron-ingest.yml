name: Cron ingest (GitHub Actions)

concurrency:
  group: cron-ingest
  cancel-in-progress: false

on:
  schedule:
    # ~cada 15 días (GitHub Actions no soporta "cada N días"; 1 y 16 del mes UTC ≈ quincenal).
    # El schedule NO dispara ingesta: solo mantiene el workflow vivo y barato en Hobby.
    - cron: '0 0 1,16 * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Ingesta cron (a pedido vía workflow_dispatch)
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          API_URL: https://match-prop-admin-dsvv.vercel.app/cron/ingest
          STATUS_URL: https://match-prop-admin-dsvv.vercel.app/cron/status
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          # Solo usado cuando el disparo es workflow_dispatch (lógica lastRun / intervalo).
          CRON_INGEST_INTERVAL_HOURS: ${{ vars.CRON_INGEST_INTERVAL_HOURS }}
        run: |
          # Schedule: no consumir cuota Hobby ni tocar la API; ingesta solo manual.
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            echo "::notice::Cron programado: ingesta automática desactivada. La ingesta es a pedido (workflow_dispatch en este workflow)."
            exit 0
          fi

          # workflow_dispatch: mismo flujo que antes (best-effort, no cortar el job por 5xx).
          set +e

          post_json() {
            local label="$1"
            local url="$2"
            local code
            code="$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$url" \
              -H "Authorization: Bearer $CRON_SECRET" \
              -H "Content-Type: application/json" \
              -d '{}' || true)"
            if [ -z "$code" ]; then code="000"; fi
            echo "${label}: HTTP ${code}"
            if [ "$code" -ge 400 ] 2>/dev/null || [ "$code" -lt 200 ] 2>/dev/null; then
              echo "::warning::${label} respondió ${code} (revisar API / CRON_SECRET / timeout)."
            fi
          }

          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET not configured. Skipping ingest (configure in repo secrets for prod cron)."
            exit 0
          fi

          echo "Checking lastRun from: $STATUS_URL"
          STATUS_JSON="$(curl -sS "$STATUS_URL" 2>/dev/null || true)"
          export STATUS_JSON
          LAST_RUN="$(python3 - <<'PY'
import json, os
s = os.environ.get("STATUS_JSON") or "{}"
try:
    data = json.loads(s)
except Exception:
    data = {}
v = data.get("lastRun")
print(v if v is not None else "")
PY
)"

          INTERVAL_HOURS="${CRON_INGEST_INTERVAL_HOURS:-240}"
          case "$INTERVAL_HOURS" in
            ''|*[!0-9]*) INTERVAL_HOURS=240 ;;
          esac
          INTERVAL_SECONDS=$((INTERVAL_HOURS * 3600))

          export LAST_RUN INTERVAL_SECONDS
          RESULT="$(python3 - <<'PY'
import os
from datetime import datetime, timezone

last = (os.environ.get("LAST_RUN") or "").strip()
raw = (os.environ.get("INTERVAL_SECONDS") or "").strip()
try:
    interval_seconds = int(raw) if raw else 864000
except ValueError:
    interval_seconds = 864000

if not last:
    print("run")
else:
    try:
        iso = last.replace("Z", "+00:00") if last.endswith("Z") else last
        last_dt = datetime.fromisoformat(iso)
        if last_dt.tzinfo is None:
            last_dt = last_dt.replace(tzinfo=timezone.utc)
        now = datetime.now(timezone.utc)
        diff = (now - last_dt).total_seconds()
        print("skip" if diff < interval_seconds else "run")
    except Exception:
        print("run")
PY
)"

          if [ "$RESULT" = "skip" ]; then
            echo "Skipping ingest: lastRun=$LAST_RUN < ${INTERVAL_HOURS}h ago."
          else
            post_json "ingest" "$API_URL"
          fi

          API_BASE="${API_URL%/cron/ingest}"
          ALERTS_URL="${API_BASE}/cron/alerts"
          post_json "alerts" "$ALERTS_URL"

          exit 0
