name: Cron ingest (GitHub Actions)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingest cron
        env:
          API_URL: https://match-prop-api-1jte.vercel.app/cron/ingest
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret not configured. Failing safely."
            exit 1
          fi
          echo "Calling: $API_URL"
          curl -sS -X POST "$API_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --fail
