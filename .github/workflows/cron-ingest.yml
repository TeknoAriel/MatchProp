name: Cron ingest (GitHub Actions)

concurrency:
  group: cron-ingest
  cancel-in-progress: false

on:
  schedule:
    # Frecuencia alta para poder "desenganchar" rápido a producción.
    # El propio job decide si dispara o hace skip según `CRON_INGEST_INTERVAL_HOURS`.
    - cron: '0 * * * *' # cada hora
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingest cron
        env:
          API_URL: https://match-prop-admin-dsvv.vercel.app/cron/ingest
          STATUS_URL: https://match-prop-admin-dsvv.vercel.app/cron/status
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          # Período de prueba: 10 días => 240 horas.
          # Cuando termine la prueba, seteá esta variable (repo variable) a `1` para volver a 1/h.
          CRON_INGEST_INTERVAL_HOURS: ${{ vars.CRON_INGEST_INTERVAL_HOURS || 240 }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET not configured. Skipping ingest (configure in repo secrets for prod cron)."
            exit 0
          fi

          echo "Checking lastRun from: $STATUS_URL"
          STATUS_JSON="$(curl -sS "$STATUS_URL" 2>/dev/null || true)"
          export STATUS_JSON
          LAST_RUN="$(python3 - <<'PY'
import json, os
s = os.environ.get("STATUS_JSON") or "{}"
try:
  data = json.loads(s)
except Exception:
  data = {}
v = data.get("lastRun")
print(v if v is not None else "")
PY
)"

          # Default 240h si la variable viene vacía o no es numérica en el runner
          INTERVAL_HOURS="${CRON_INGEST_INTERVAL_HOURS:-240}"
          case "$INTERVAL_HOURS" in
            ''|*[!0-9]*) INTERVAL_HOURS=240 ;;
          esac
          INTERVAL_SECONDS=$((INTERVAL_HOURS * 3600))

          export LAST_RUN INTERVAL_SECONDS
          RESULT="$(python3 - <<'PY'
import os
from datetime import datetime, timezone

last = (os.environ.get("LAST_RUN") or "").strip()
raw = (os.environ.get("INTERVAL_SECONDS") or "").strip()
try:
    interval_seconds = int(raw) if raw else 864000
except ValueError:
    interval_seconds = 864000

if not last:
    print("run")
else:
    try:
        iso = last.replace("Z", "+00:00") if last.endswith("Z") else last
        last_dt = datetime.fromisoformat(iso)
        if last_dt.tzinfo is None:
            last_dt = last_dt.replace(tzinfo=timezone.utc)
        now = datetime.now(timezone.utc)
        diff = (now - last_dt).total_seconds()
        print("skip" if diff < interval_seconds else "run")
    except Exception:
        # Formato inesperado: no bloquear el workflow; intentar ingest
        print("run")
PY
)"

          if [ "$RESULT" = "skip" ]; then
            echo "Skipping ingest: lastRun=$LAST_RUN < ${INTERVAL_HOURS}h ago."
            exit 0
          fi

          echo "Calling ingest: $API_URL"
          if ! curl -sS -X POST "$API_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --fail; then
            echo "Ingest API returned non-2xx (cold start o CRON_SECRET). Skip sin fallar workflow."
          fi
