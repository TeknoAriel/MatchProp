# Opcional: merge automático cuando el PR tiene la etiqueta "automerge" y CI pasó.
# Requisitos en GitHub: el token del workflow debe poder mergear (branch protection / bypass).
# Si falla por permisos, usar "Enable auto-merge" en la UI del PR o un PAT en AUTOMERGE_TOKEN.
name: PR auto-merge (etiqueta automerge)

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: github.event.label.name == 'automerge'
    runs-on: ubuntu-latest
    steps:
      - name: Habilitar auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.AUTOMERGE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --squash --auto
