# Merge automático cuando el PR tiene la etiqueta "automerge" y CI pasó.
# Se ejecuta al agregar la etiqueta O al sincronizar (push) para re-asegurar auto-merge.
# Requisitos: token con permiso merge; si falla, usar AUTOMERGE_TOKEN (PAT) o "Enable auto-merge" en la UI.
name: PR auto-merge (etiqueta automerge)

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: github.event.action == 'synchronize' || (github.event.action == 'labeled' && github.event.label.name == 'automerge')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check automerge label and enable merge
        env:
          GH_TOKEN: ${{ secrets.AUTOMERGE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          LABELS=$(gh pr view "$PR" --json labels -q '.labels[].name')
          if echo "$LABELS" | grep -qx "automerge"; then
            gh pr merge "$PR" --repo "${{ github.repository }}" --squash --auto
            echo "Auto-merge habilitado para PR #$PR (merge cuando CI pase)"
          else
            echo "PR sin etiqueta automerge, skip"
          fi
