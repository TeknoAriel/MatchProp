name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# PR: cancelar corridas viejas del mismo PR. Push a main: NO cancelar (evita cortar Smoke UX / smoke-prod).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PNPM_VERSION: '9.0.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # Un único check requerido en rulesets: "CI / Verify".
  # Antes: Typecheck, Lint, Unit tests, Integration tests y Full build en paralelo → más puntos de fallo y carreras con otros workflows.
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: matchprop
          POSTGRES_PASSWORD: matchprop
          POSTGRES_DB: matchprop
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://matchprop:matchprop@localhost:5432/matchprop
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:shared
      - run: pnpm --filter api exec prisma generate
      - run: pnpm -r run typecheck
      - run: pnpm --filter api run typecheck:vercel
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm -r run test

      - name: DB migrate + integration (test:all)
        run: |
          mkdir -p apps/api
          echo "DATABASE_URL=${DATABASE_URL}" >> apps/api/.env
          pnpm --filter api exec prisma migrate deploy
          pnpm --filter api run test:all
      - name: Pre-deploy (builds apps; sin duplicar typecheck/tests)
        env:
          PRE_DEPLOY_FAST: '1'
        run: pnpm run pre-deploy:verify

  # Disparo directo tras Verify (no depender solo de workflow_run, que a veces no encadena).
  deploy-hooks:
    name: Vercel deploy hooks
    runs-on: ubuntu-latest
    needs: [verify]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - name: POST hooks (API → Web → Admin)
        env:
          VERCEL_DEPLOY_HOOK_API: ${{ secrets.VERCEL_DEPLOY_HOOK_API }}
          VERCEL_DEPLOY_HOOK_WEB: ${{ secrets.VERCEL_DEPLOY_HOOK_WEB }}
          VERCEL_DEPLOY_HOOK_ADMIN: ${{ secrets.VERCEL_DEPLOY_HOOK_ADMIN }}
        run: |
          set -uo pipefail
          post_hook() {
            local label="$1" url="$2"
            if [ -z "${url:-}" ]; then
              echo "::notice::Hook ${label} sin secreto — omitido"
              return 0
            fi
            code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$url" || echo "000")
            echo "POST hook ${label} → HTTP ${code}"
            case "$code" in 200|201|204) ;; *) echo "::warning::Hook ${label} no OK (${code})" ;; esac
          }
          post_hook "API" "${VERCEL_DEPLOY_HOOK_API:-}"
          post_hook "WEB" "${VERCEL_DEPLOY_HOOK_WEB:-}"
          post_hook "ADMIN" "${VERCEL_DEPLOY_HOOK_ADMIN:-}"

  smoke-ux:
    name: Smoke UX (E2E)
    runs-on: ubuntu-latest
    needs: [verify]
    timeout-minutes: 15
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: matchprop
          POSTGRES_PASSWORD: matchprop
          POSTGRES_DB: matchprop
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:shared
      - run: pnpm --filter api exec prisma generate
      - run: pnpm --filter web build
      - name: Smoke UX (API + Web + Playwright)
        env:
          DATABASE_URL: postgresql://matchprop:matchprop@localhost:5432/matchprop
        run: bash scripts/smoke-ux-ci.sh

  # Mismo criterio que merge-after-ci.yml pero en el mismo workflow: workflow_run a veces no encadena
  # tras CI verde en PR (p. ej. PR #44 2026-04), dejando PRs con automerge abiertos y prod sin deploy.
  merge-automerge-pr:
    name: Merge automerge PR (post CI)
    if: github.event_name == 'pull_request'
    needs: [verify, smoke-ux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge squash si etiqueta automerge
        env:
          GH_TOKEN: ${{ secrets.AUTOMERGE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PR="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          try_merge() {
            local P="$1"
            if gh pr merge "$P" --repo "$REPO" --squash --delete-branch; then
              return 0
            fi
            echo "::notice::Merge normal falló; reintento con --admin (PAT con permisos de admin en el repo)"
            gh pr merge "$P" --repo "$REPO" --squash --delete-branch --admin
          }
          state=$(gh pr view "$PR" --repo "$REPO" --json state -q '.state' 2>/dev/null || echo "")
          if [ "$state" != "OPEN" ]; then
            echo "PR #$PR state=$state; skip"
            exit 0
          fi
          labels=$(gh pr view "$PR" --repo "$REPO" --json labels -q '.labels[].name' 2>/dev/null || true)
          if ! echo "$labels" | grep -qx "automerge"; then
            echo "PR #$PR sin etiqueta automerge; skip"
            exit 0
          fi
          mergeable=$(gh pr view "$PR" --repo "$REPO" --json mergeable -q '.mergeable' 2>/dev/null || echo "UNKNOWN")
          if [ "$mergeable" = "UNKNOWN" ] || [ -z "$mergeable" ]; then
            echo "mergeable UNKNOWN, esperando 20s..."
            sleep 20
            mergeable=$(gh pr view "$PR" --repo "$REPO" --json mergeable -q '.mergeable' 2>/dev/null || echo "UNKNOWN")
          fi
          if [ "$mergeable" = "false" ] || [ "$mergeable" = "False" ]; then
            echo "PR #$PR mergeable=false; no se mergea (conflictos)."
            exit 0
          fi
          echo "Merge squash PR #$PR"
          try_merge "$PR"
          echo "PR #$PR mergeado."

  smoke-prod:
    name: Smoke prod (post-merge)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [verify, smoke-ux]
    # No bloquear el workflow CI (ni workflow_run → hooks/CLI): si prod va atrasada,
    # smoke puede fallar por timing y crear un deadlock sin deploy.
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Wait for Vercel deploy
        run: sleep 180
      - name: Smoke prod URLs
        run: |
          WEB_URL="https://match-prop-web.vercel.app" API_URL="https://match-prop-admin-dsvv.vercel.app" bash scripts/smoke-prod.sh
      - name: Aviso deploy listo
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WEB="https://match-prop-web.vercel.app"
          API="https://match-prop-admin-dsvv.vercel.app"
          echo "## ✅ Deploy listo en producción" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| URL | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| [Web - Login](${WEB}/login) | ✓ |" >> $GITHUB_STEP_SUMMARY
          echo "| [API health](${API}/health) | ✓ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL de prueba:** $WEB/login" >> $GITHUB_STEP_SUMMARY
          PR_NUM=$(echo "${{ github.event.head_commit.message }}" | sed -n 's/.*Merge pull request #\([0-9]*\).*/\1/p')
          if [ -n "$PR_NUM" ]; then
            gh pr comment "$PR_NUM" --body "✅ **Deploy listo.** Podés verificar en: $WEB/login" || true
          fi
          if [ -n "${{ secrets.DEPLOY_WEBHOOK_URL }}" ]; then
            curl -sS -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"✅ MatchProp deploy listo: $WEB/login\"}" || true
          fi
