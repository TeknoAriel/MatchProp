name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: '9.0.0'

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build:shared
      - run: pnpm --filter api exec prisma generate
      - run: pnpm -r run typecheck
      - run: pnpm --filter api run typecheck:vercel

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build:shared
      - run: pnpm --filter api exec prisma generate
      - run: pnpm -r run test

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: matchprop
          POSTGRES_PASSWORD: matchprop
          POSTGRES_DB: matchprop
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build:shared
      - run: pnpm --filter api exec prisma generate

      - name: Setup DB
        run: |
          cd apps/api
          echo "DATABASE_URL=postgresql://matchprop:matchprop@localhost:5432/matchprop" >> .env
          pnpm exec prisma migrate deploy

      - name: Run integration tests
        run: pnpm --filter api run test:all

  build:
    name: Full build (gate)
    runs-on: ubuntu-latest
    needs: [typecheck, lint, unit-tests, integration-tests]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: matchprop
          POSTGRES_PASSWORD: matchprop
          POSTGRES_DB: matchprop
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Setup DB for pre-deploy
        run: |
          mkdir -p apps/api
          echo "DATABASE_URL=postgresql://matchprop:matchprop@localhost:5432/matchprop" >> apps/api/.env
          pnpm --filter api exec prisma generate
          pnpm --filter api exec prisma migrate deploy

      - name: Pre-deploy verify (build api + web + admin + test:all)
        run: pnpm run pre-deploy:verify

  smoke-prod:
    name: Smoke prod (post-merge)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Wait for Vercel deploy
        run: sleep 180
      - name: Smoke prod URLs
        run: |
          WEB_URL="https://match-prop-web.vercel.app" API_URL="https://match-prop-admin-dsvv.vercel.app" bash scripts/smoke-prod.sh
