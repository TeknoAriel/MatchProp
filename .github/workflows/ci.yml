name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# PR: cancelar corridas viejas del mismo PR. Push a main: NO cancelar (evita cortar Smoke UX / smoke-prod).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PNPM_VERSION: '9.0.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # Un único check requerido en rulesets: "CI / Verify".
  # Antes: Typecheck, Lint, Unit tests, Integration tests y Full build en paralelo → más puntos de fallo y carreras con otros workflows.
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: matchprop
          POSTGRES_PASSWORD: matchprop
          POSTGRES_DB: matchprop
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://matchprop:matchprop@localhost:5432/matchprop
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:shared
      - run: pnpm --filter api exec prisma generate
      - run: pnpm -r run typecheck
      - run: pnpm --filter api run typecheck:vercel
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm -r run test

      - name: DB migrate + integration (test:all)
        run: |
          mkdir -p apps/api
          echo "DATABASE_URL=${DATABASE_URL}" >> apps/api/.env
          pnpm --filter api exec prisma migrate deploy
          pnpm --filter api run test:all
      - name: Pre-deploy (builds apps; sin duplicar typecheck/tests)
        env:
          PRE_DEPLOY_FAST: '1'
        run: pnpm run pre-deploy:verify

  smoke-ux:
    name: Smoke UX (E2E)
    runs-on: ubuntu-latest
    needs: [verify]
    timeout-minutes: 15
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: matchprop
          POSTGRES_PASSWORD: matchprop
          POSTGRES_DB: matchprop
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:shared
      - run: pnpm --filter api exec prisma generate
      - run: pnpm --filter web build
      - name: Smoke UX (API + Web + Playwright)
        env:
          DATABASE_URL: postgresql://matchprop:matchprop@localhost:5432/matchprop
        run: bash scripts/smoke-ux-ci.sh

  smoke-prod:
    name: Smoke prod (post-merge)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [verify, smoke-ux]
    # No bloquear el workflow CI (ni workflow_run → hooks/CLI): si prod va atrasada,
    # smoke puede fallar por timing y crear un deadlock sin deploy.
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Wait for Vercel deploy
        run: sleep 180
      - name: Smoke prod URLs
        run: |
          WEB_URL="https://match-prop-web.vercel.app" API_URL="https://match-prop-admin-dsvv.vercel.app" bash scripts/smoke-prod.sh
      - name: Aviso deploy listo
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WEB="https://match-prop-web.vercel.app"
          API="https://match-prop-admin-dsvv.vercel.app"
          echo "## ✅ Deploy listo en producción" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| URL | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| [Web - Login](${WEB}/login) | ✓ |" >> $GITHUB_STEP_SUMMARY
          echo "| [API health](${API}/health) | ✓ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL de prueba:** $WEB/login" >> $GITHUB_STEP_SUMMARY
          PR_NUM=$(echo "${{ github.event.head_commit.message }}" | sed -n 's/.*Merge pull request #\([0-9]*\).*/\1/p')
          if [ -n "$PR_NUM" ]; then
            gh pr comment "$PR_NUM" --body "✅ **Deploy listo.** Podés verificar en: $WEB/login" || true
          fi
          if [ -n "${{ secrets.DEPLOY_WEBHOOK_URL }}" ]; then
            curl -sS -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"✅ MatchProp deploy listo: $WEB/login\"}" || true
          fi
