# Cuando CI termina en verde en un PR, mergea en caliente si tiene etiqueta automerge.
# Complementa pr-automerge-label (que solo habilita auto-merge al etiquetar/pushear).
# Requiere secret AUTOMERGE_TOKEN si main está protegido (ver docs/CONFIGURAR_DEPLOY_AUTOMATICO.md).
name: Merge after CI

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-if-ready:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Merge squash PR con etiqueta automerge
        env:
          GH_TOKEN: ${{ secrets.AUTOMERGE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SHA="${{ github.event.workflow_run.head_sha }}"
          REPO="${{ github.repository }}"

          nums=$(gh api "repos/${REPO}/commits/${SHA}/pulls" -q '.[].number' 2>/dev/null || true)
          if [ -z "$nums" ]; then
            echo "Ningún PR asociado a este commit; nada que mergear."
            exit 0
          fi

          for PR in $nums; do
            state=$(gh pr view "$PR" --repo "$REPO" --json state -q '.state' 2>/dev/null || echo "")
            if [ "$state" != "OPEN" ]; then
              echo "PR #$PR state=$state; skip"
              continue
            fi
            labels=$(gh pr view "$PR" --repo "$REPO" --json labels -q '.labels[].name' 2>/dev/null || true)
            if ! echo "$labels" | grep -qx "automerge"; then
              echo "PR #$PR sin etiqueta automerge; skip"
              continue
            fi
            mergeable=$(gh pr view "$PR" --repo "$REPO" --json mergeable -q '.mergeable' 2>/dev/null || echo "UNKNOWN")
            if [ "$mergeable" = "UNKNOWN" ]; then
              echo "mergeable UNKNOWN, esperando 20s..."
              sleep 20
              mergeable=$(gh pr view "$PR" --repo "$REPO" --json mergeable -q '.mergeable' 2>/dev/null || echo "UNKNOWN")
            fi
            # UNSTABLE suele aparecer cuando fallan checks no requeridos (ej. smoke UX con continue-on-error).
            # Para auto-merge usamos MERGEABLE o UNSTABLE, siempre que CI principal esté en verde.
            if [ "$mergeable" != "MERGEABLE" ] && [ "$mergeable" != "UNSTABLE" ]; then
              echo "PR #$PR mergeable=$mergeable; no se mergea (conflictos reales o reglas de rama)."
              continue
            fi
            echo "Merge squash PR #$PR"
            gh pr merge "$PR" --repo "$REPO" --squash --delete-branch
            echo "PR #$PR mergeado."
          done
