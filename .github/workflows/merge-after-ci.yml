# Cuando CI termina en verde en un PR, mergea en caliente si tiene etiqueta automerge.
# Complementa pr-automerge-label (que solo habilita auto-merge al etiquetar/pushear).
# Requiere secret AUTOMERGE_TOKEN si main está protegido (ver docs/CONFIGURAR_DEPLOY_AUTOMATICO.md).
name: Merge after CI

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-if-ready:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.event != 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Merge squash PR con etiqueta automerge
        env:
          GH_TOKEN: ${{ secrets.AUTOMERGE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SHA="${{ github.event.workflow_run.head_sha }}"
          REPO="${{ github.repository }}"

          try_merge() {
            local PR="$1"
            if gh pr merge "$PR" --repo "$REPO" --squash --delete-branch; then
              return 0
            fi
            echo "::notice::Merge normal falló; reintento con --admin (PAT con permisos de admin en el repo)"
            gh pr merge "$PR" --repo "$REPO" --squash --delete-branch --admin
          }

          nums=$(gh api "repos/${REPO}/commits/${SHA}/pulls" -q '.[].number' 2>/dev/null || true)
          if [ -z "$nums" ]; then
            echo "Ningún PR asociado a este commit; nada que mergear."
            exit 0
          fi

          for PR in $nums; do
            state=$(gh pr view "$PR" --repo "$REPO" --json state -q '.state' 2>/dev/null || echo "")
            if [ "$state" != "OPEN" ]; then
              echo "PR #$PR state=$state; skip"
              continue
            fi
            labels=$(gh pr view "$PR" --repo "$REPO" --json labels -q '.labels[].name' 2>/dev/null || true)
            if ! echo "$labels" | grep -qx "automerge"; then
              echo "PR #$PR sin etiqueta automerge; skip"
              continue
            fi
            mergeable=$(gh pr view "$PR" --repo "$REPO" --json mergeable -q '.mergeable' 2>/dev/null || echo "UNKNOWN")
            if [ "$mergeable" = "UNKNOWN" ] || [ -z "$mergeable" ]; then
              echo "mergeable UNKNOWN, esperando 20s..."
              sleep 20
              mergeable=$(gh pr view "$PR" --repo "$REPO" --json mergeable -q '.mergeable' 2>/dev/null || echo "UNKNOWN")
            fi
            # gh devuelve el booleano JSON true/false, no las cadenas MERGEABLE/UNSTABLE (antes solo aceptábamos
            # MERGEABLE|UNSTABLE y nunca mergeaba). Solo omitir si hay conflicto explícito (false).
            if [ "$mergeable" = "false" ] || [ "$mergeable" = "False" ]; then
              echo "PR #$PR mergeable=false; no se mergea (conflictos)."
              continue
            fi
            echo "Merge squash PR #$PR"
            try_merge "$PR"
            echo "PR #$PR mergeado."
          done

  # workflow_dispatch del CI también queda cubierto (event != 'push').
