# Crea PR a main y agrega etiqueta automerge en cada push a un branch.
# Flujo: push → PR creado/actualizado → etiqueta automerge → CI pasa → merge automático → Vercel deploy.
# El usuario/agente solo hace: commit + push. Nada más.
name: Deploy auto (PR + automerge)

on:
  push:
    branches-ignore:
      - main
      - master
      - gh-pages

permissions:
  contents: read
  pull-requests: write

jobs:
  create-or-update-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure automerge label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create automerge --color "0E8A16" --description "Auto-merge when CI passes" 2>/dev/null || true

      - name: Create PR to main (if not exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          # Evitar branches de bots
          if [[ "$BRANCH" == dependabot/* ]] || [[ "$BRANCH" == renovate/* ]]; then
            echo "Skipping bot branch"
            exit 0
          fi

          EXISTING=$(gh pr list --head "$BRANCH" --base main --state open --json number -q '.[0].number' 2>/dev/null || true)

          if [[ -z "$EXISTING" || "$EXISTING" == "null" ]]; then
            echo "Creating PR from $BRANCH to main"
            gh pr create --base main --head "$BRANCH" \
              --title "Deploy: $BRANCH → main" \
              --body "PR automático. Merge cuando CI pase (etiqueta automerge)." \
              --label automerge
          else
            echo "PR #$EXISTING already exists, adding automerge label"
            gh pr edit "$EXISTING" --add-label automerge 2>/dev/null || true
          fi
