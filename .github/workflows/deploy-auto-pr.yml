# Crea PR a main y agrega etiqueta automerge en cada push a un branch.
# Flujo: push → PR creado/actualizado → etiqueta automerge → CI pasa → merge automático → Vercel deploy.
# El usuario/agente solo hace: commit + push. Nada más.
name: Deploy auto (PR + automerge)

on:
  push:
    branches-ignore:
      - main
      - master
      - gh-pages

# issues: write → crear etiqueta "automerge" (sin esto gh pr create --label falla con 403)
permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  create-or-update-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure automerge label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh label create automerge --color "0E8A16" --description "Auto-merge when CI passes" || \
            echo "Label automerge ya existe (ok)"

      - name: Create PR to main (if not exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          BRANCH="${{ github.ref_name }}"
          OWNER="${{ github.repository_owner }}"
          # GitHub API / gh --head requieren owner:rama (solo el nombre de rama suele no matchear → lista vacía → create duplicado falla)
          HEAD_REF="${OWNER}:${BRANCH}"

          if [[ "$BRANCH" == dependabot/* ]] || [[ "$BRANCH" == renovate/* ]]; then
            echo "Skipping bot branch"
            exit 0
          fi

          EXISTING=$(gh pr list --head "$HEAD_REF" --base main --state open --json number -q 'if length > 0 then .[0].number else empty end')

          if [[ -z "$EXISTING" ]]; then
            echo "Creating PR from $BRANCH to main (listado por head=$HEAD_REF)"
            # create en mismo repo: --head solo nombre de rama (no owner:rama)
            if ! gh pr create --base main --head "$BRANCH" \
              --title "Deploy: $BRANCH → main" \
              --body "PR automático. Merge cuando CI pase (etiqueta automerge)." \
              --label automerge; then
              echo "create falló (p. ej. PR ya existía); reintentando detección por head"
              EXISTING=$(gh pr list --head "$HEAD_REF" --base main --state open --json number -q 'if length > 0 then .[0].number else empty end')
              if [[ -z "$EXISTING" ]]; then
                echo "::error::No se pudo crear ni encontrar PR para $HEAD_REF"
                exit 1
              fi
            fi
          fi

          if [[ -n "$EXISTING" ]]; then
            echo "PR #$EXISTING: asegurando etiqueta automerge"
            gh pr edit "$EXISTING" --add-label automerge || true
          fi
