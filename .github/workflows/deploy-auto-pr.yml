# Crea PR a main y agrega etiqueta automerge en cada push a un branch.
# Flujo: push → PR creado/actualizado → etiqueta automerge → CI pasa → merge automático → Vercel deploy.
# El usuario/agente solo hace: commit + push. Nada más.
name: Deploy auto (PR + automerge)

on:
  push:
    branches-ignore:
      - main
      - master
      - gh-pages
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to create/update PR from'
        required: true
        default: 'docs-url-canon-20260320'

# contents: write → push automático de format/lint; issues/pr → etiqueta y PR
permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  PNPM_VERSION: '9.0.0'

jobs:
  create-or-update-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Auto-format and lint fix
        run: |
          pnpm format
          pnpm lint:fix
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: auto-format and lint"
            git push
          fi

      - name: Ensure automerge label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh label create automerge --color "0E8A16" --description "Auto-merge when CI passes" || \
            echo "Label automerge ya existe (ok)"

      - name: Create PR to main (if not exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BRANCH="${{ github.event.inputs.branch }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi
          OWNER="${{ github.repository_owner }}"
          HEAD_REF="${OWNER}:${BRANCH}"
          REPO="${{ github.repository }}"

          if [[ "$BRANCH" == dependabot/* ]] || [[ "$BRANCH" == renovate/* ]]; then
            echo "Skipping bot branch"
            exit 0
          fi

          # gh pr list a veces devuelve vacío cuando el PR existe; fallback REST API
          EXISTING=$(gh pr list --head "$HEAD_REF" --base main --state open --json number -q 'if length > 0 then .[0].number else empty end' 2>/dev/null || true)
          if [[ -z "$EXISTING" ]]; then
            EXISTING=$(curl -sS -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/${REPO}/pulls?head=${HEAD_REF}&state=open" \
              | jq -r 'if length > 0 then .[0].number | tostring else empty end')
          fi

          if [[ -z "$EXISTING" ]]; then
            echo "Creating PR from $BRANCH to main"
            if ! gh pr create --base main --head "$BRANCH" \
              --title "Deploy: $BRANCH → main" \
              --body "PR automático. Merge cuando CI pase (etiqueta automerge)." \
              --label automerge; then
              echo "create falló (p. ej. PR ya existía); fallback REST API"
              EXISTING=$(curl -sS -H "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/repos/${REPO}/pulls?head=${HEAD_REF}&state=open" \
                | jq -r 'if length > 0 then .[0].number | tostring else empty end')
              if [[ -z "$EXISTING" ]]; then
                echo "::error::No se pudo crear ni encontrar PR para $HEAD_REF"
                exit 1
              fi
            fi
          fi

          if [[ -n "$EXISTING" ]]; then
            echo "PR #$EXISTING: asegurando etiqueta automerge"
            gh pr edit "$EXISTING" --add-label automerge || true
          fi
