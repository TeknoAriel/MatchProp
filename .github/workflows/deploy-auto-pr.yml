# Crea PR a main y agrega etiqueta automerge en cada push a un branch.
# No hace commit/push de format (evita carreras con CI y commits extra en Hobby).
# El formato lo valida únicamente el workflow CI → job "Verify".
name: Deploy auto (PR + automerge)

on:
  push:
    branches-ignore:
      - main
      - master
      - gh-pages
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to create/update PR from'
        required: true
        default: 'docs-url-canon-20260320'

permissions:
  contents: read
  actions: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  create-or-update-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup GH CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh --version
      - name: Ensure automerge label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh label create automerge --color "0E8A16" --description "Auto-merge when CI passes" || \
            echo "Label automerge ya existe (ok)"

      - name: Create PR to main (if not exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BRANCH="${{ github.event.inputs.branch }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi
          OWNER="${{ github.repository_owner }}"
          HEAD_REF="${OWNER}:${BRANCH}"
          REPO="${{ github.repository }}"

          if [[ "$BRANCH" == dependabot/* ]] || [[ "$BRANCH" == renovate/* ]]; then
            echo "Skipping bot branch"
            exit 0
          fi

          EXISTING=$(gh pr list --head "$HEAD_REF" --base main --state open --json number -q 'if length > 0 then .[0].number else empty end' 2>/dev/null || true)
          if [[ -z "$EXISTING" ]]; then
            EXISTING=$(curl -sS -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/${REPO}/pulls?head=${HEAD_REF}&state=open" \
              | jq -r 'if length > 0 then .[0].number | tostring else empty end')
          fi

          if [[ -z "$EXISTING" ]]; then
            echo "Creating PR from $BRANCH to main"
            if ! gh pr create --base main --head "$BRANCH" \
              --title "Deploy: $BRANCH → main" \
              --body "PR automático. Merge cuando CI pase (etiqueta automerge)." \
              --label automerge; then
              echo "create falló (p. ej. PR ya existía); fallback REST API"
              EXISTING=$(curl -sS -H "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/repos/${REPO}/pulls?head=${HEAD_REF}&state=open" \
                | jq -r 'if length > 0 then .[0].number | tostring else empty end')
              if [[ -z "$EXISTING" ]]; then
                echo "::error::No se pudo crear ni encontrar PR para $HEAD_REF"
                exit 1
              fi
            fi
          fi

          if [[ -n "$EXISTING" ]]; then
            echo "PR #$EXISTING: asegurando etiqueta automerge"
            gh pr edit "$EXISTING" --add-label automerge || true
          fi

          echo "Disparando CI vía workflow_dispatch (evita checks 'Expected' sin run)..."
          gh workflow run "CI" --ref "$BRANCH" || true
